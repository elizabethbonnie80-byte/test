<!-- Confirm-signup email — sends the 6-digit OTP code ({{ .Token }}) for the in-app code screen
     (app/sign-up verifyOtp). Used by local Supabase when [auth.email] enable_confirmations = true;
     mirror this template in the hosted dashboard (Auth → Email Templates → Confirm signup). -->
<h2>Confirm your LenderMatch™ account</h2>
<p>Enter this code to confirm your email address:</p>
<p style="font-size:28px;font-weight:700;letter-spacing:6px;margin:16px 0">{{ .Token }}</p>
<p style="color:#6b7280;font-size:13px">The code expires in 1 hour. If you didn't create an account, you can ignore this email.</p>
