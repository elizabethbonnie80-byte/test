<!-- Password-reset email — sends the 6-digit CODE ({{ .Token }}) that the /forgot-password page
     verifies (verifyOtp type 'recovery'), then updateUser({password}). A CODE, not a link: magic
     links get consumed by email prefetch scanners (Outlook Safe Links / Gmail), which causes
     otp_expired when the user actually clicks. Mirror this in the dashboard (Auth -> Email Templates
     -> Reset Password). -->
<h2>Reset your password</h2>
<p>Enter this code in the app to set a new password:</p>
<p style="font-size:28px;font-weight:700;letter-spacing:6px;margin:16px 0">{{ .Token }}</p>
<p style="color:#6b7280;font-size:13px">The code expires in 1 hour. If you didn't request a password reset, you can safely ignore this email — your password won't change.</p>
